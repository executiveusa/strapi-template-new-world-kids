project:
  name: "new-world-kids"
  language: "TypeScript"
  framework: "Next.js 16 + separate Hermes backend + MDX journal"

commands:
  test: "pnpm test"
  lint: "pnpm lint"
  build: "pnpm build"

rules:
  - "use TypeScript strict mode and avoid any types"
  - "never push directly to main - always branch and PR"
  - "use jcodemunch-mcp search_symbols before reading full files"
  - "keep frontend and backend separate - UI in apps/ui or apps/blog, orchestration in services/hermes"
  - "keep legacy Strapi catch-all pages stable until each route is explicitly migrated"
  - "all agent actions should be loggable to a durable ledger before automation expands"
  - "bilingual: all new user-facing strings should support en and es"
  - "trust claims must map to public verification documents"
  - "imports from workspace packages should resolve through packages/"
  - "never hardcode secrets - use env vars, reference .env.example for key names"

boundaries:
  never_touch:
    - "apps/strapi/src/migrations/**"
    - "*.lock"
    - "pnpm-lock.yaml"
    - ".ralphy/**"
    - "ops/reports/**"
    - "agent-skills/external/**"
    - ".git/**"

capabilities:
  browser: "auto"

notifications:
  discord_webhook: "${DISCORD_WEBHOOK_URL}"

engines:
  default: "claude"
  branch_per_task: true
